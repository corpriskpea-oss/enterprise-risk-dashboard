<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Risk Matrix Dashboard – v3.00</title>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; }
.container { max-width: 980px; margin:20px auto; }

.controls select { padding:6px; margin-right:10px; }
.matrix-title { margin:8px 0; font-weight:bold; }

.matrix-wrapper { position:relative; }
.matrix {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:2px;
}
.cell {
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
.low { background:#43a047; color:white; }
.medium { background:#fdd835; }
.high { background:#e53935; color:white; }

.point {
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:3;
}
.circle {
  width:22px; height:22px;
  background:black; border-radius:50%;
}
.triangle {
  width:0;height:0;
  border-left:11px solid transparent;
  border-right:11px solid transparent;
  border-bottom:22px solid #1e88e5;
}
.star {
  font-size:26px;
  color:#8e24aa;
}

svg {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:2;
}

.legend { margin-top:10px; font-size:14px; }

.axis-box {
  margin-top:14px;
  padding:12px;
  background:#ffffff;
  border-left:6px solid #1976d2;
  font-size:14px;
  line-height:1.6;
}
.axis-box b { color:#0d47a1; }
</style>
</head>

<body>
<div class="container">

<h2>Risk Matrix Dashboard</h2>

<div class="controls">
RF:
<select id="rf"></select>

Quarter:
<select id="q">
  <option value="Q1">Q1/2569</option>
  <option value="Q2">Q2/2569</option>
  <option value="Q3">Q3/2569</option>
  <option value="Q4">Q4/2569</option>
</select>
</div>

<div id="title" class="matrix-title"></div>

<div class="matrix-wrapper">
<svg id="svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#8e24aa"/>
    </marker>
  </defs>
</svg>
<div id="matrix" class="matrix"></div>
</div>

<div class="legend">
● ดำ = Pre‑Management &nbsp;
▲ ฟ้า = Post‑Management &nbsp;
★ ม่วง = L‑Qx × I‑Qx
</div>

<div id="axisInfo" class="axis-box"></div>

</div>

<script>
const sheetUrl =
  "https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=523652456";

const matrix = document.getElementById("matrix");
const svg = document.getElementById("svg");
const rfSel = document.getElementById("rf");
const qSel = document.getElementById("q");
const title = document.getElementById("title");
const axisBox = document.getElementById("axisInfo");

const clamp = v => Math.min(5, Math.max(1, v));

function riskLevel(s){
  if (s <= 4) return "low";
  if (s <= 14) return "medium";
  return "high";
}

function drawMatrix(){
  matrix.innerHTML="";
  svg.innerHTML = svg.innerHTML.split("</defs>")[0]+"</defs>";
  for(let y=5;y>=1;y--){
    for(let x=1;x<=5;x++){
      const c=document.createElement("div");
      c.className="cell "+riskLevel(x*y);
      c.textContent=x*y;
      matrix.appendChild(c);
    }
  }
}

function pos(L,I){
  L=clamp(L); I=clamp(I);
  return { x:(L-0.5)*20, y:(5-I+0.5)*20 };
}

function drawArrow(a,b){
  const l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",a.x+"%");
  l.setAttribute("y1",a.y+"%");
  l.setAttribute("x2",b.x+"%");
  l.setAttribute("y2",b.y+"%");
  l.setAttribute("stroke","#8e24aa");
  l.setAttribute("stroke-width","3");
  l.setAttribute("marker-end","url(#arrow)");
  svg.appendChild(l);
}

function plot(L,I,html,off){
  L=clamp(L); I=clamp(I);
  const p=document.createElement("div");
  p.className="point";
  p.innerHTML=html;
  p.style.left=`calc(${(L-0.5)*20}% + ${off}px)`;
  p.style.top=`calc(${(5-I+0.5)*20}% + ${off}px)`;
  matrix.appendChild(p);
}

let data = [];

Papa.parse(sheetUrl, {
  download:true,
  header:true,
  skipEmptyLines:true,
  complete(res){
    data = res.data.map(r => ({
      rf: r.RF,
      pre:{ L:+r.L_pre, I:+r.I_pre },
      post:{ L:+r.L_post, I:+r.I_post },
      Q1:{ L:+r.L_Q1, I:+r.I_Q1 },
      Q2:{ L:+r.L_Q2, I:+r.I_Q2 },
      Q3:{ L:+r.L_Q3, I:+r.I_Q3 },
      Q4:{ L:+r.L_Q4, I:+r.I_Q4 }
    }));

    rfSel.innerHTML =
      `<option value="ALL">ทั้งหมด</option>` +
      [...new Set(data.map(d=>d.rf))]
        .map(rf=>`<option value="${rf}">RF${rf}</option>`).join("");

    render();
  }
});

function render(){
  drawMatrix();
  const rf = rfSel.value;
  const q = qSel.value;

  title.textContent = `Pre → ${q}/2569 | ${rf==="ALL"?"ทุก RF":"RF"+rf}`;

  axisBox.innerHTML =
    "<b>ความหมายแกนโอกาส (Likelihood):</b> ความสำเร็จการดำเนินงานตามแผนบริหารความเสี่ยง<br>"+
    "<b>ความหมายแกนผลกระทบ (Impact):</b> ผลกระทบต่อเป้าหมายเชิงยุทธศาสตร์ขององค์กร";

  data.filter(d=>rf==="ALL"||d.rf==rf).forEach((d,i)=>{
    plot(d.pre.L, d.pre.I,'<div class="circle"></div>',i*4);
    plot(d.post.L,d.post.I,'<div class="triangle"></div>',i*4+6);
    if(d[q]){
      drawArrow(pos(d.pre.L,d.pre.I), pos(d[q].L,d[q].I));
      plot(d[q].L,d[q].I,'<div class="star">★</div>',i*4+14);
    }
  });
}

rfSel.onchange = render;
qSel.onchange = render;
</script>
</body>
</html>
