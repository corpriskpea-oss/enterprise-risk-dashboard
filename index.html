<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Enterprise Risk Dashboard – v4.01 (Risk Response)</title>

<!-- PapaParse -->
https://unpkg.com/papaparse@5.4.1/papaparse.min.js

<style>
body { margin:0; font-family:Arial,sans-serif; background:#f3f4f6; }
.layout { display:flex; min-height:100vh; }

.sidebar {
  width:240px; background:#0f172a; color:white; padding:16px;
}
.sidebar button {
  width:100%; padding:10px; margin-bottom:8px;
  background:none; border:none; color:white; text-align:left;
}
.sidebar button.active { background:#334155; }

.content { flex:1; padding:24px; background:white; }

.controls select { padding:6px; margin-right:10px; }

.cards, .grids {
  display:flex; gap:12px; margin:16px 0;
}

.card, .grid {
  flex:1; padding:14px; border-radius:8px;
  font-size:14px; color:white;
}

.green { background:#16a34a; }
.red { background:#dc2626; }
.blue { background:#2563eb; }
.gray { background:#6b7280; }

.grid {
  text-align:center;
}
.grid b {
  display:block;
  font-size:28px;
  margin-top:8px;
}

table { width:100%; border-collapse:collapse; }
th, td {
  border:1px solid #ddd; padding:8px; font-size:14px;
}
th { background:#e5e7eb; }

.good { background:#dcfce7; }
.bad { background:#fee2e2; }
</style>
</head>

<body>
<div class="layout">

<div class="sidebar">
  <h3>Enterprise Risk</h3>
  <button class="active">Risk Response</button>
</div>

<div class="content">
<h2>Risk Response</h2>

<div class="controls">
  RF:
  <select id="rf"></select>
  Quarter:
  <select id="q">
    <option value="Q1/2569">Q1/2569</option>
    <option value="Q2/2569">Q2/2569</option>
    <option value="Q3/2569">Q3/2569</option>
    <option value="Q4/2569">Q4/2569</option>
  </select>
</div>

<!-- ✅ Summary Cards -->
<div class="cards">
  <div class="card green">
    <b>แผนที่สำเร็จ</b>
    <div id="cardSuccess">0 แผน</div>
  </div>
  <div class="card red">
    <b>แผนต่ำกว่าเป้า</b>
    <div id="cardFail">0 แผน</div>
  </div>
  <div class="card blue">
    <b>ร้อยละผลการดำเนินงาน</b>
    <div id="cardResult">0 %</div>
  </div>
  <div class="card gray">
    <b>ร้อยละเป้าหมาย</b>
    <div id="cardTarget">0 %</div>
  </div>
</div>

<!-- ✅ GRID DASHBOARD -->
<div class="grids">
  <div class="grid green">
    Achieved
    <b id="gridAchieved">0</b>
  </div>
  <div class="grid red">
    Below Target
    <b id="gridBelow">0</b>
  </div>
  <div class="grid blue">
    Weighted Performance (%)
    <b id="gridPerf">0</b>
  </div>
</div>

<table>
<thead>
<tr>
  <th>RF</th><th>PlanType</th><th>Order</th><th>PlanName</th>
  <th>Weight %</th><th>Target</th><th>Result</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<script>
const sheetUrl =
"https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=1852497314";

const rfSel = document.getElementById("rf");
const qSel = document.getElementById("q");
const tbody = document.getElementById("tbody");

const cardSuccess = document.getElementById("cardSuccess");
const cardFail    = document.getElementById("cardFail");
const cardResult  = document.getElementById("cardResult");
const cardTarget  = document.getElementById("cardTarget");

const gridAchieved = document.getElementById("gridAchieved");
const gridBelow    = document.getElementById("gridBelow");
const gridPerf     = document.getElementById("gridPerf");

let rows = [];

Papa.parse(sheetUrl,{
  download:true, header:true, skipEmptyLines:true,
  complete(res){
    rows = res.data;
    rfSel.innerHTML =
      `<option value="ALL">ALL</option>` +
      [...new Set(rows.map(r=>r.RF_GroupName))]
        .map(r=>`<option>${r}</option>`).join("");
    render();
  }
});

function render(){
  tbody.innerHTML="";
  const rf = rfSel.value;
  const q  = qSel.value;

  const f = rows.filter(r =>
    (rf==="ALL" || r.RF_GroupName===rf) &&
    r.Quarter===q
  );

  let success=0, fail=0;
  let sumResult=0, sumTarget=0;

  f.forEach(r=>{
    const w = +r.PlanWeightPercent;
    const res = +r.ResultPercent;
    const tar = +r.TargetLevel5;

    if(res >= tar) success++; else fail++;

    sumResult += (w * res) / 100;
    sumTarget += (w * tar) / 100;

    tbody.innerHTML += `
      <tr>
        <td>${r.RF_GroupName}</td>
        <td>${r.PlanType}</td>
        <td>${r.PlanOrder}</td>
        <td>${r.PlanName}</td>
        <td>${w}</td>
        <td>${tar}</td>
        <td class="${res>=tar?"good":"bad"}">${res}</td>
      </tr>`;
  });

  cardSuccess.textContent = success + " แผน";
  cardFail.textContent    = fail + " แผน";
  cardResult.textContent  = sumResult.toFixed(2) + " %";
  cardTarget.textContent  = sumTarget.toFixed(2) + " %";

  gridAchieved.textContent = success;
  gridBelow.textContent    = fail;
  gridPerf.textContent     = sumResult.toFixed(1);
}

rfSel.onchange = render;
qSel.onchange  = render;
</script>
</body>
</html>
``
