<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v2.03 (KRI)</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f3f4f6;
}
.layout {
  display:flex;
  min-height:100vh;
}
.sidebar {
  width:240px;
  background:#0f172a;
  color:white;
  padding:16px;
}
.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}
.sidebar button.active {
  background:#334155;
}
.content {
  flex:1;
  padding:24px;
  background:white;
}
.toolbar {
  margin:16px 0;
}
select {
  padding:6px 10px;
}

.summary {
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.card {
  border-radius:8px;
  padding:12px 16px;
  min-width:180px;
  border:1px solid #e5e7eb;
}
.card h4 {
  margin:0 0 8px 0;
  font-size:14px;
}
.counts {
  display:flex;
  gap:10px;
  font-size:13px;
}
.red { color:#dc2626; }
.yellow { color:#ca8a04; }
.green { color:#16a34a; }

table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ddd;
  padding:8px;
  vertical-align:top;
}
th {
  background:#e5e7eb;
  text-align:center;
}
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  background:#e5e7eb;
}
.gauge {
  width:140px;
  height:80px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ---------- Utilities ---------- */
function toNumber(val) {
  if (val === null || val === undefined) return NaN;
  return Number(String(val).replace(/,/g, ""));
}
function isNumeric(val) {
  return !isNaN(toNumber(val));
}

/* ---------- Data Hook ---------- */
function useKRIData() {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const url =
      "https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=2142357339";
    fetch(url)
      .then(r => r.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header:true, skipEmptyLines:true });
        setRows(parsed.data);
        setLoading(false);
      });
  }, []);

  return { rows, loading };
}

/* ---------- Risk Meter ---------- */
function RiskMeter({ value, ra, rt }) {
  if (ra === 0 && rt === 0) {
    return <span className="badge">ยังไม่กำหนดเกณฑ์</span>;
  }

  const max = Math.max(value, ra) * 1.1;
  const toAngle = v => Math.min((v / max) * 180, 180);

  const polar = a => {
    const rad = (a - 180) * Math.PI / 180;
    return { x:100 + 80*Math.cos(rad), y:90 + 80*Math.sin(rad) };
  };

  const rtP = polar(toAngle(rt));
  const raP = polar(toAngle(ra));
  const valP = polar(toAngle(value));

  return (
    <svg viewBox="0 0 200 120" className="gauge">
      <path d={`M20 90 A80 80 0 0 1 ${rtP.x} ${rtP.y}`} stroke="#dc2626" strokeWidth="16" fill="none"/>
      <path d={`M${rtP.x} ${rtP.y} A80 80 0 0 1 ${raP.x} ${raP.y}`} stroke="#facc15" strokeWidth="16" fill="none"/>
      <path d={`M${raP.x} ${raP.y} A80 80 0 0 1 180 90`} stroke="#16a34a" strokeWidth="16" fill="none"/>

      <line x1="100" y1="90" x2={valP.x} y2={valP.y} stroke="#111827" strokeWidth="3"/>
      <circle cx="100" cy="90" r="4" fill="#111827"/>
      <text x="100" y="115" textAnchor="middle" fontSize="12">{value}</text>
    </svg>
  );
}

/* ---------- App ---------- */
function App() {
  const { rows, loading } = useKRIData();
  const [rfFilter, setRfFilter] = React.useState("ALL");

  const filtered = rows.filter(r =>
    rfFilter === "ALL" || r.RF === rfFilter
  );

  /* ----- Summary ----- */
  const summary = React.useMemo(() => {
    const map = {};
    filtered.forEach(r => {
      if (!isNumeric(r.KRI_Status) || !isNumeric(r.RA) || !isNumeric(r.RT)) return;
      const rf = r.RF;
      if (!map[rf]) map[rf] = { red:0, yellow:0, green:0 };

      const v = toNumber(r.KRI_Status);
      const ra = toNumber(r.RA);
      const rt = toNumber(r.RT);

      if (v < rt) map[rf].red++;
      else if (v < ra) map[rf].yellow++;
      else map[rf].green++;
    });
    return map;
  }, [filtered]);

  const rfList = ["ALL", ...new Set(rows.map(r => r.RF))];

  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button className="active">KRI Report v2.03</button>
      </div>

      <div className="content">
        <h2>KRI Report</h2>

        {loading && <p>กำลังโหลดข้อมูล…</p>}

        {!loading && (
          <>
            {/* ✅ Summary Cards */}
            <div className="summary">
              {Object.entries(summary).map(([rf, s]) => (
                <div key={rf} className="card">
                  <h4>{rf}</h4>
                  <div className="counts">
                    <span className="red">🔴 {s.red}</span>
                    <span className="yellow">🟡 {s.yellow}</span>
                    <span className="green">🟢 {s.green}</span>
                  </div>
                </div>
              ))}
            </div>

            <div className="toolbar">
              <label>RF: </label>
              <select value={rfFilter} onChange={e => setRfFilter(e.target.value)}>
                {rfList.map(rf => <option key={rf}>{rf}</option>)}
              </select>
            </div>

            <table>
              <thead>
                <tr>
                  <th>RF</th>
                  <th>KRI_Name</th>
                  <th>KRI_Status</th>
                  <th>RA</th>
                  <th>RT</th>
                  <th>Risk Meter</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((r, i) => (
                  <tr key={i}>
                    <td>{r.RF}</td>
                    <td>{r.KRI_Name}</td>
                    <td>{r.KRI_Status}</td>
                    <td>{r.RA}</td>
                    <td>{r.RT}</td>
                    <td>
                      {isNumeric(r.KRI_Status) && isNumeric(r.RA) && isNumeric(r.RT)
                        ? <RiskMeter value={toNumber(r.KRI_Status)} ra={toNumber(r.RA)} rt={toNumber(r.RT)} />
                        : <span className="badge">KRI เชิงคุณภาพ</span>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
``
