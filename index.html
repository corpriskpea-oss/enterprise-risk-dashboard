<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard</title>

<!-- ✅ React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- ✅ Babel (ให้ใช้ JSX ได้ในไฟล์เดียว) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ✅ PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; }
  .layout { display:flex; min-height:100vh; }
  .sidebar {
    width:240px; background:#0f172a; color:white; padding:16px;
  }
  .sidebar button {
    width:100%; padding:10px; margin-bottom:8px;
    background:none; border:none; color:white; text-align:left; cursor:pointer;
  }
  .sidebar button.active { background:#334155; }
  .content { flex:1; padding:24px; background:#fff; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
function App() {
  const [menu, setMenu] = React.useState("kri");
  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button className={menu==="plan"?"active":""} onClick={()=>setMenu("plan")}>Plan</button>
        <button className={menu==="kri"?"active":""} onClick={()=>setMenu("kri")}>KRI</button>
      </div>
      <div className="content">
        <h2>{menu.toUpperCase()}</h2>
        <p>✅ ถ้าเห็นข้อความนี้ แปลว่า React โหลดสมบูรณ์ ไม่หน้าขาว</p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
``
