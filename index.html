<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Enterprise Risk Dashboard</title>

<!-- ✅ React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- ✅ Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; }
  .sidebar { width:240px; background:#0f172a; color:white; padding:16px; }
  .sidebar button {
    width:100%; padding:10px; margin-bottom:8px;
    background:none; border:none; color:white;
    text-align:left; cursor:pointer;
  }
  .sidebar button.active { background:#334155; }
  .content { flex:1; padding:24px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
function App() {
  const [tab, setTab] = React.useState("plan");

  return (
    <div style={{display:"flex", minHeight:"100vh"}}>
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button className={tab==="plan"?"active":""} onClick={()=>setTab("plan")}>
          Plan Report
        </button>
        <button className={tab==="kri"?"active":""} onClick={()=>setTab("kri")}>
          KRI Report
        </button>
        <button className={tab==="matrix"?"active":""} onClick={()=>setTab("matrix")}>
          Risk Matrix
        </button>
        <button className={tab==="response"?"active":""} onClick={()=>setTab("response")}>
          Risk Response
        </button>
      </div>

      <div className="content">
        <h2>{tab}</h2>
        <p>✅ หน้าไม่ว่างแล้ว</p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
