<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Enterprise Risk Dashboard</title>

  <!-- ✅ React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- ✅ Babel (สำคัญมาก) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ✅ Recharts -->
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#f3f4f6; }
    .sidebar { width:240px; background:#0f172a; color:white; padding:16px; }
    .sidebar button {
      width:100%; padding:10px; margin-bottom:8px;
      background:none; border:none; color:white; text-align:left;
    }
    .sidebar button.active { background:#334155; }
    .content { padding:24px; flex:1; }
  </style>
</head>

<body>
<div id="root"></div>

<!-- ✅ React code ต้องอยู่ใน type="text/babel" -->
<script type="text/babel">

const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

function App() {
  const [tab, setTab] = React.useState("response");

  return (
    <div style={{display:"flex", minHeight:"100vh"}}>
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button onClick={()=>setTab("plan")}>Plan Report</button>
        <button onClick={()=>setTab("kri")}>KRI Report</button>
        <button onClick={()=>setTab("matrix")}>Risk Matrix</button>
        <button onClick={()=>setTab("response")}>Risk Response</button>
      </div>

      <div className="content">
        {tab === "response" && (
          <>
            <h2>Risk Response</h2>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={[
                { name:"AI Use Case", target:100, actual:85, percent:85 }
              ]}>
                <XAxis dataKey="name"/>
                <YAxis/>
                <Tooltip/>
                <Bar dataKey="target" fill="#64748b" />
                <Bar dataKey="actual" fill="#0f766e" />
                <Bar dataKey="percent" fill="#2563eb" />
              </BarChart>
            </ResponsiveContainer>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
