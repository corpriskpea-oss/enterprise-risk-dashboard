<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Enterprise Risk Dashboard</title>

<style>
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
}

/* ===== Layout ===== */
.layout {
  display:flex;
  height:100vh;
}

/* ===== Sidebar ===== */
.sidebar {
  width:240px;
  background:#0f172a;
  color:white;
  padding:16px;
}

.sidebar h3 {
  margin-top:0;
  margin-bottom:16px;
  font-size:18px;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-radius:4px;
  font-size:14px;
}

.sidebar button.active,
.sidebar button:hover {
  background:#334155;
}

/* ===== Content ===== */
.content {
  flex:1;
  background:#f3f4f6;
}

iframe {
  width:100%;
  height:100%;
  border:none;
  background:white;
}
</style>
</head>

<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h3>Enterprise Risk</h3>

    <button class="active" onclick="loadPage('plan.html', this)">
      Plan
    </button>

    <button onclick="loadPage('kri.html', this)">
      KRI
    </button>

    <button onclick="loadPage('matrix.html', this)">
      Risk Matrix
    </button>

    <button onclick="loadPage('risk-response.html', this)">
      Risk Response
    </button>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <iframe id="mainFrame" src="plan.html"></iframe>
  </main>
</div>

<script>
function loadPage(page, btn){
  document.getElementById("mainFrame").src = page;

  // active state
  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
