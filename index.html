<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v2.00 (KRI)</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f3f4f6;
}
.layout {
  display:flex;
  min-height:100vh;
}
.sidebar {
  width:240px;
  background:#0f172a;
  color:white;
  padding:16px;
}
.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}
.sidebar button.active {
  background:#334155;
}
.content {
  flex:1;
  padding:24px;
  background:white;
}
.toolbar {
  margin-bottom:16px;
}
select {
  padding:6px 10px;
}
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ddd;
  padding:8px;
  vertical-align:top;
}
th {
  background:#e5e7eb;
  text-align:center;
}
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  background:#e5e7eb;
}
.gauge {
  width:120px;
  height:65px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ==================== Utilities ==================== */
function isNumeric(val) {
  return val !== null && val !== "" && !isNaN(val);
}

/* ==================== Data Hook ==================== */
function useKRIData() {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const sheetId = "1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw";
    const url =
      `https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=2142357339`;

    fetch(url)
      .then(res => res.text())
      .then(csv => {
        const parsed = Papa.parse(csv, {
          header: true,
          skipEmptyLines: true
        });
        setRows(parsed.data);
        setLoading(false);
      });
  }, []);

  return { rows, loading };
}

/* ==================== Risk Gauge ==================== */
function RiskGauge({ value, ra, rt }) {
  let color = "#16a34a"; // green
  if (value < rt) color = "#dc2626";       // red
  else if (value < ra) color = "#facc15"; // yellow

  const max = Math.max(ra, value);
  const percent = Math.min(value / max, 1);
  const arc = percent * 180;

  return (
    <svg viewBox="0 0 200 100" className="gauge">
      <path
        d="M10 90 A80 80 0 0 1 190 90"
        fill="none"
        stroke="#e5e7eb"
        strokeWidth="16"
      />
      <path
        d="M10 90 A80 80 0 0 1 190 90"
        fill="none"
        stroke={color}
        strokeWidth="16"
        strokeDasharray={`${arc * 2.8} 1000`}
      />
      <text x="100" y="80" textAnchor="middle" fontSize="14">
        {value}
      </text>
    </svg>
  );
}

/* ==================== App ==================== */
function App() {
  const { rows, loading } = useKRIData();
  const [rfFilter, setRfFilter] = React.useState("ALL");

  const rfList = React.useMemo(() => {
    const set = new Set(rows.map(r => r.RF));
    return ["ALL", ...Array.from(set)];
  }, [rows]);

  const filtered = React.useMemo(() => {
    return rows.filter(r =>
      rfFilter === "ALL" || r.RF === rfFilter
    );
  }, [rows, rfFilter]);

  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button className="active">KRI Report v2.00</button>
      </div>

      <div className="content">
        <h2>KRI Report</h2>

        {loading && <p>กำลังโหลดข้อมูล…</p>}

        {!loading && (
          <>
            <div className="toolbar">
              <label>RF: </label>
              <select
                value={rfFilter}
                onChange={e => setRfFilter(e.target.value)}
              >
                {rfList.map(rf => (
                  <option key={rf} value={rf}>{rf}</option>
                ))}
              </select>
            </div>

            <table>
              <thead>
                <tr>
                  <th style={{width:"8%"}}>RF</th>
                  <th>KRI_Name</th>
                  <th style={{width:"12%"}}>KRI_Status</th>
                  <th style={{width:"10%"}}>RA</th>
                  <th style={{width:"10%"}}>RT</th>
                  <th style={{width:"15%"}}>Risk Meter</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((r, i) => {
                  const numeric =
                    isNumeric(r.KRI_Status) &&
                    isNumeric(r.RA) &&
                    isNumeric(r.RT);

                  return (
                    <tr key={i}>
                      <td style={{textAlign:"center"}}>{r.RF}</td>
                      <td>{r.KRI_Name}</td>
                      <td style={{textAlign:"center"}}>{r.KRI_Status}</td>
                      <td style={{textAlign:"center"}}>{r.RA}</td>
                      <td style={{textAlign:"center"}}>{r.RT}</td>
                      <td style={{textAlign:"center"}}>
                        {numeric ? (
                          <RiskGauge
                            value={Number(r.KRI_Status)}
                            ra={Number(r.RA)}
                            rt={Number(r.RT)}
                          />
                        ) : (
                          <span className="badge">KRI เชิงคุณภาพ</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<App />);

</script>
</body>
</html>
