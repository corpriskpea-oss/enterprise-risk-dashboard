<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v2.06 (KRI)</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; }
.layout { display:flex; min-height:100vh; }

.sidebar { width:240px; background:#0f172a; color:white; padding:16px; }
.sidebar button {
  width:100%; padding:10px; margin-bottom:8px;
  background:none; border:none; color:white; text-align:left;
}
.sidebar button.active { background:#334155; }

.content { flex:1; padding:24px; background:white; }

.toolbar { margin-bottom:14px; display:flex; gap:12px; align-items:center; }
select { padding:6px 10px; }

.summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.card {
  border-radius:8px; padding:12px 16px;
  min-width:180px; border:1px solid #e5e7eb;
}
.counts { display:flex; gap:10px; font-size:13px; }
.green { color:#16a34a; } .yellow { color:#ca8a04; } .red { color:#dc2626; }

table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#e5e7eb; }

.badge { padding:4px 8px; border-radius:6px; font-size:12px; background:#e5e7eb; }
.gauge { width:140px; height:80px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
/* ================= Utils ================= */
function toNumber(v){
  if (v===null || v===undefined) return NaN;
  return Number(String(v).replace(/,/g,""));
}
const isNum = v => !isNaN(toNumber(v));

/* ================= Risk Level ================= */
function getRiskLevel(row){
  const kri = toNumber(row.KRI_Status);
  const ra  = toNumber(row.RA);
  const rt  = toNumber(row.RT);
  if (!isNum(kri)||!isNum(ra)||!isNum(rt)) return null;

  if (row.Direction==="LOW_GOOD"){
    if (kri <= ra) return "green";
    if (kri <  rt) return "yellow";
    return "red";
  }
  // HIGH_GOOD
  if (kri <  rt) return "red";
  if (kri <  ra) return "yellow";
  return "green";
}

/* ================= Data ================= */
function useKRIData(){
  const [rows,setRows]=React.useState([]);
  const [loading,setLoading]=React.useState(true);

  React.useEffect(()=>{
    const url =
      "https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=2142357339";
    fetch(url).then(r=>r.text()).then(csv=>{
      const p=Papa.parse(csv,{header:true,skipEmptyLines:true});
      setRows(p.data); setLoading(false);
    });
  },[]);
  return {rows,loading};
}

/* ================= Gauge ================= */
function RiskMeter({kri, ra, rt, direction, level}){
  if (!isNum(kri)||!isNum(ra)||!isNum(rt))
    return <span className="badge">KRI เชิงคุณภาพ</span>;

  const max = Math.max(kri, ra, rt) * 1.1;
  const angle = Math.min((kri / max) * 180, 180);

  const polar = a => {
    const r=(a-180)*Math.PI/180;
    return { x:100+80*Math.cos(r), y:90+80*Math.sin(r) };
  };

  const rtP = polar((rt/max)*180);
  const raP = polar((ra/max)*180);
  const vP  = polar(angle);

  return (
    <svg viewBox="0 0 200 120" className="gauge">
      <path d={`M20 90 A80 80 0 0 1 ${rtP.x} ${rtP.y}`}
        stroke="#dc2626" strokeWidth="16" fill="none"/>
      <path d={`M${rtP.x} ${rtP.y} A80 80 0 0 1 ${raP.x} ${raP.y}`}
        stroke="#facc15" strokeWidth="16" fill="none"/>
      <path d={`M${raP.x} ${raP.y} A80 80 0 0 1 180 90`}
        stroke="#16a34a" strokeWidth="16" fill="none"/>

      <line x1="100" y1="90" x2={vP.x} y2={vP.y}
        stroke="#111827" strokeWidth="3"/>
      <circle cx="100" cy="90" r="4" fill="#111827"/>
      <text x="100" y="115" textAnchor="middle" fontSize="12">
        {kri}
      </text>
    </svg>
  );
}

/* ================= App ================= */
function App(){
  const {rows,loading}=useKRIData();
  const [rf,setRf]=React.useState("ALL");
  const [m,setM]=React.useState("ALL");

  const rfList=["ALL",...new Set(rows.map(r=>r.RF_GroupName))];
  const mList =["ALL",...new Set(rows.map(r=>r.Month))];

  const filtered=rows.filter(r=>
    (rf==="ALL"||r.RF_GroupName===rf) &&
    (m==="ALL" ||r.Month===m)
  );

  const summary=React.useMemo(()=>{
    const o={};
    filtered.forEach(r=>{
      const rf=r.RF_GroupName;
      if(!o[rf]) o[rf]={green:0,yellow:0,red:0};
      const lvl=getRiskLevel(r);
      if(lvl) o[rf][lvl]++;
    });
    return o;
  },[filtered]);

  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button className="active">KRI</button>
      </div>
      <div className="content">
        <h2>KRI Report</h2>
        {loading&&<p>กำลังโหลดข้อมูล…</p>}
        {!loading&&(
          <>
            <div className="toolbar">
              RF:
              <select value={rf} onChange={e=>setRf(e.target.value)}>
                {rfList.map(x=><option key={x}>{x}</option>)}
              </select>
              Month:
              <select value={m} onChange={e=>setM(e.target.value)}>
                {mList.map(x=><option key={x}>{x}</option>)}
              </select>
            </div>

            <div className="summary">
              {Object.entries(summary).map(([k,s])=>(
                <div className="card" key={k}>
                  <b>{k}</b>
                  <div className="counts">
                    <span className="green">🟢 {s.green}</span>
                    <span className="yellow">🟡 {s.yellow}</span>
                    <span className="red">🔴 {s.red}</span>
                  </div>
                </div>
              ))}
            </div>

            <table>
              <thead>
                <tr>
                  <th>RF</th><th>Month</th><th>KRI_Name</th><th>Units</th>
                  <th>KRI_Status</th><th>RA</th><th>RT</th><th>Risk Meter</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((r,i)=>
                  <tr key={i}>
                    <td>{r.RF_GroupName}</td>
                    <td>{r.Month}</td>
                    <td>{r.KRI_Name}</td>
                    <td>{r.Units}</td>
                    <td>{r.KRI_Status}</td>
                    <td>{r.RA}</td>
                    <td>{r.RT}</td>
                    <td>
                      <RiskMeter
                        kri={toNumber(r.KRI_Status)}
                        ra={toNumber(r.RA)}
                        rt={toNumber(r.RT)}
                        direction={r.Direction}
                        level={getRiskLevel(r)}
                      />
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
