<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Enterprise Risk Dashboard – BASE</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PapaParse -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    .layout { display:flex; min-height:100vh; }
    .sidebar {
      width:220px; background:#0f172a; color:white; padding:16px;
    }
    .content { flex:1; padding:24px; }
    button { margin-right:8px; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
function App(){
  const [menu, setMenu] = React.useState("kri");
  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button onClick={() => setMenu("plan")}>Plan</button>
        <button onClick={() => setMenu("kri")}>KRI</button>
      </div>
      <div className="content">
        <h2>{menu.toUpperCase()}</h2>
        <p>✅ BASE ทำงานแล้ว (ไม่หน้าขาว)</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
