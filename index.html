<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v1.0.1 (Plan)</title>

<!-- ✅ React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- ✅ Babel (เพื่อใช้ JSX ในไฟล์เดียว) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ✅ PapaParse (CSV parser ที่รองรับ , ในข้อความ) -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f4f6;
  }
  .layout {
    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 240px;
    background: #0f172a;
    color: white;
    padding: 16px;
  }
  .sidebar h3 {
    margin-top: 0;
  }
  .sidebar button {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    background: none;
    border: none;
    color: white;
    text-align: left;
    cursor: pointer;
  }
  .sidebar button.active {
    background: #334155;
  }
  .content {
    flex: 1;
    padding: 24px;
    background: white;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px;
  }
  th {
    background: #e5e7eb;
    text-align: center;
  }
  td {
    vertical-align: top;
  }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* =========================================================
   v1.0.1 : usePlanData (แก้ CSV column เลื่อน)
   ========================================================= */
function usePlanData() {
  const [plans, setPlans] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    const sheetId = "1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw";
    const sheetName = "Plan";

    const url =
      `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=${sheetName}`;

    fetch(url)
      .then(res => res.text())
      .then(csv => {
        const parsed = Papa.parse(csv, {
          header: true,
          skipEmptyLines: true,
        });

        if (parsed.errors.length > 0) {
          console.error(parsed.errors);
          setError("เกิดข้อผิดพลาดในการอ่าน CSV");
        } else {
          setPlans(parsed.data);
        }

        setLoading(false);
      })
      .catch(err => {
        console.error(err);
        setError("ไม่สามารถโหลดข้อมูลจาก Google Sheet ได้");
        setLoading(false);
      });
  }, []);

  return { plans, loading, error };
}

/* =========================================================
   App — v1.0.1 (Plan Report)
   ========================================================= */
function App() {
  const [tab, setTab] = React.useState("plan");
  const { plans, loading, error } = usePlanData();

  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button
          className={tab === "plan" ? "active" : ""}
          onClick={() => setTab("plan")}
        >
          Plan Report (v1.0.1)
        </button>
      </div>

      <div className="content">
        <h2>Plan Report</h2>

        {loading && <p>กำลังโหลดข้อมูลจาก Google Sheet…</p>}
        {error && <p style={{ color: "red" }}>{error}</p>}

        {!loading && !error && (
          <table>
            <thead>
              <tr>
                <th>แผนงาน</th>
                <th>RF Group</th>
                <th>ผลการดำเนินงาน (%)</th>
                <th>เป้าหมาย</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody>
              {plans.map((p, i) => (
                <tr key={i}>
                  <td>{p.PlanName}</td>
                  <td style={{ textAlign: "center" }}>
                    {p.RF_GroupName}
                  </td>
                  <td style={{ textAlign: "center" }}>
                    {p.ResultPercent}
                  </td>
                  <td style={{ textAlign: "center" }}>
                    {p.TargetLevel5}
                  </td>
                  <td>{p.Status_Combined}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
