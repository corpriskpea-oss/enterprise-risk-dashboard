<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Enterprise Risk Dashboard – v.final.1.00</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h3>Enterprise Risk</h3>

    <button class="active" onclick="loadPage('plan.html', this)">
      Plan
    </button>

    <button onclick="loadPage('kri.html', this)">
      KRI
    </button>

    <button onclick="loadPage('matrix.html', this)">
      Risk Matrix
    </button>

    <button onclick="loadPage('risk-response.html', this)">
      Risk Response
    </button>
  </aside>

  <!-- Content -->
  <main class="content">
    <iframe id="mainFrame" src="plan.html"></iframe>
  </main>

</div>

<script>
function loadPage(page, btn){
  document.getElementById("mainFrame").src = page;

  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}
</script>

</body>
</html>
