<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Enterprise Risk Dashboard</title>

  <!-- ✅ React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- ✅ Babel (JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ✅ PapaParse -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    .layout { display:flex; min-height:100vh; }
    .sidebar { width:220px; background:#0f172a; color:white; padding:16px; }
    .content { flex:1; padding:24px; }
    button { display:block; width:100%; margin-bottom:8px; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    /************ PATCH A : Load KRI Data ************/

    function toNumber(val) {
      if (val === undefined || val === null) return null;
      return Number(String(val).replace('%','').trim());
    }

    function useKRIData() {
      const [rows, setRows] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        const url =
          "https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&sheet=KRI";

        fetch(url)
          .then(r => r.text())
          .then(csv => {
            const parsed = Papa.parse(csv, {
              header: true,
              skipEmptyLines: true
            });
            setRows(parsed.data);
            setLoading(false);
          });
      }, []);

      return { rows, loading };
    }

    function App() {
      const [menu, setMenu] = React.useState("kri");
      const kri = useKRIData();

      return (
        <div className="layout">
          <div className="sidebar">
            <h3>Enterprise Risk</h3>
            <button onClick={() => setMenu("plan")}>Plan</button>
            <button onClick={() => setMenu("kri")}>KRI</button>
          </div>

          <div className="content">
            <h2>{menu.toUpperCase()}</h2>
            <p>✅ BASE + PATCH A ทำงานแล้ว</p>
            <p>KRI rows loaded: {kri.rows.length}</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
