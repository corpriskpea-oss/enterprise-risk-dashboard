<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v2.01 (KRI)</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f3f4f6;
}
.layout {
  display:flex;
  min-height:100vh;
}
.sidebar {
  width:240px;
  background:#0f172a;
  color:white;
  padding:16px;
}
.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}
.sidebar button.active {
  background:#334155;
}
.content {
  flex:1;
  padding:24px;
  background:white;
}
.toolbar {
  margin-bottom:16px;
}
select {
  padding:6px 10px;
}
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ddd;
  padding:8px;
  vertical-align:top;
}
th {
  background:#e5e7eb;
  text-align:center;
}
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  background:#e5e7eb;
}
.gauge {
  width:140px;
  height:80px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ================= Utilities ================= */
function isNumeric(val) {
  return val !== null && val !== "" && !isNaN(val);
}

/* ================= Data Hook ================= */
function useKRIData() {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const url =
      "https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=2142357339";

    fetch(url)
      .then(res => res.text())
      .then(csv => {
        const parsed = Papa.parse(csv, {
          header: true,
          skipEmptyLines: true
        });
        setRows(parsed.data);
        setLoading(false);
      });
  }, []);

  return { rows, loading };
}

/* ================= Risk Meter (3 สี + เข็ม) ================= */
function RiskMeter({ value, ra, rt }) {

  // ยังไม่กำหนดเกณฑ์
  if (ra === 0 && rt === 0) {
    return <span className="badge">ยังไม่กำหนดเกณฑ์</span>;
  }

  const max = Math.max(value, ra) * 1.1;

  const toAngle = v => Math.min((v / max) * 180, 180);

  const rtAngle = toAngle(rt);
  const raAngle = toAngle(ra);
  const valAngle = toAngle(value);

  const polar = angle => {
    const rad = (angle - 180) * Math.PI / 180;
    return {
      x: 100 + 80 * Math.cos(rad),
      y: 90 + 80 * Math.sin(rad)
    };
  };

  const rtP = polar(rtAngle);
  const raP = polar(raAngle);
  const valP = polar(valAngle);

  return (
    <svg viewBox="0 0 200 120" className="gauge">
      {/* 🔴 Red zone */}
      <path
        d={`M20 90 A80 80 0 0 1 ${rtP.x} ${rtP.y}`}
        fill="none"
        stroke="#dc2626"
        strokeWidth="16"
      />

      {/* 🟡 Yellow zone */}
      <path
        d={`M${rtP.x} ${rtP.y} A80 80 0 0 1 ${raP.x} ${raP.y}`}
        fill="none"
        stroke="#facc15"
        strokeWidth="16"
      />

      {/* 🟢 Green zone */}
      <path
        d={`M${raP.x} ${raP.y} A80 80 0 0 1 180 90`}
        fill="none"
        stroke="#16a34a"
        strokeWidth="16"
      />

      {/* 🪡 Needle */}
      <line
        x1="100"
        y1="90"
        x2={valP.x}
        y2={valP.y}
        stroke="#111827"
        strokeWidth="3"
      />
      <circle cx="100" cy="90" r="4" fill="#111827" />

      {/* Value */}
      <text x="100" y="115" textAnchor="middle" fontSize="12">
        {value}
      </text>
    </svg>
  );
}

/* ================= App ================= */
function App() {
  const { rows, loading } = useKRIData();
  const [rfFilter, setRfFilter] = React.useState("ALL");

  const rfList = React.useMemo(() => {
    const set = new Set(rows.map(r => r.RF));
    return ["ALL", ...Array.from(set)];
  }, [rows]);

  const filtered = React.useMemo(() => {
    return rows.filter(r =>
      rfFilter === "ALL" || r.RF === rfFilter
    );
  }, [rows, rfFilter]);

  return (
    <div className="layout">
      <div className="sidebar">
        <h3>Enterprise Risk</h3>
        <button className="active">KRI Report v2.01</button>
      </div>

      <div className="content">
        <h2>KRI Report</h2>

        {loading && <p>กำลังโหลดข้อมูล…</p>}

        {!loading && (
          <>
            <div className="toolbar">
              <label>RF: </label>
              <select
                value={rfFilter}
                onChange={e => setRfFilter(e.target.value)}
              >
                {rfList.map(rf => (
                  <option key={rf} value={rf}>{rf}</option>
                ))}
              </select>
            </div>

            <table>
              <thead>
                <tr>
                  <th style={{width:"6%"}}>RF</th>
                  <th>KRI_Name</th>
                  <th style={{width:"12%"}}>KRI_Status</th>
                  <th style={{width:"8%"}}>RA</th>
                  <th style={{width:"8%"}}>RT</th>
                  <th style={{width:"18%"}}>Risk Meter</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((r, i) => {
                  const numeric =
                    isNumeric(r.KRI_Status) &&
                    isNumeric(r.RA) &&
                    isNumeric(r.RT);

                  return (
                    <tr key={i}>
                      <td style={{textAlign:"center"}}>{r.RF}</td>
                      <td>{r.KRI_Name}</td>
                      <td style={{textAlign:"center"}}>{r.KRI_Status}</td>
                      <td style={{textAlign:"center"}}>{r.RA}</td>
                      <td style={{textAlign:"center"}}>{r.RT}</td>
                      <td style={{textAlign:"center"}}>
                        {numeric ? (
                          <RiskMeter
                            value={Number(r.KRI_Status)}
                            ra={Number(r.RA)}
                            rt={Number(r.RT)}
                          />
                        ) : (
                          <span className="badge">KRI เชิงคุณภาพ</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<App />);

</script>
</body>
</html>
