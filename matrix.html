<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Enterprise Risk Dashboard – v3.03.2 (Matrix)</title>

<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
.layout { display:flex; min-height:100vh; }
.content { flex:1; padding:24px; background:white; }

.controls select { padding:6px; margin-right:10px; }
.matrix-title { margin:10px 0; font-weight:bold; }

.cards { display:flex; gap:12px; margin:12px 0; }
.card { flex:1; padding:12px; border-radius:8px; font-size:14px; border:1px solid #e5e7eb; }
.card b { display:block; margin-bottom:6px; }
.card.gray { background:#e5e7eb; color:#374151; }
.card.low { background:#43a047; color:white; }
.card.medium { background:#fdd835; }
.card.high { background:#e53935; color:white; }

.matrix-wrapper { position:relative; max-width:900px; }
.matrix { display:grid; grid-template-columns:repeat(5,1fr); gap:2px; }
.cell {
  height:90px; display:flex; align-items:center; justify-content:center;
  font-weight:bold;
}
.low { background:#43a047; color:white; }
.medium { background:#fdd835; }
.high { background:#e53935; color:white; }

.point { position:absolute; transform:translate(-50%,-50%); z-index:3; }
.circle { width:22px; height:22px; background:black; border-radius:50%; }
.triangle {
  width:0;height:0;
  border-left:11px solid transparent;
  border-right:11px solid transparent;
  border-bottom:22px solid #1e88e5;
}
.star { font-size:26px; color:#8e24aa; }

svg {
  position:absolute; top:0; left:0;
  width:100%; height:100%; pointer-events:none; z-index:2;
}

.legend { margin-top:10px; font-size:14px; }
.axis-box {
  margin-top:14px; padding:12px;
  background:#ffffff; border-left:6px solid #1976d2;
  font-size:14px; line-height:1.6;
}
.axis-box b { color:#0d47a1; }
</style>
</head>

<body>
<div class="layout">
<div class="content">

<h2>Risk Matrix</h2>

<div class="controls">
  RF:
  <select id="rf"></select>
  Quarter:
  <select id="q">
    <option value="Q1">Q1/2569</option>
    <option value="Q2">Q2/2569</option>
    <option value="Q3">Q3/2569</option>
    <option value="Q4">Q4/2569</option>
  </select>
</div>

<div class="cards">
  <div id="cardL" class="card gray"><b>Likelihood</b><span>-</span></div>
  <div id="cardI" class="card gray"><b>Impact</b><span>-</span></div>
  <div id="cardS" class="card gray"><b>Risk Score (L×I)</b><span>-</span></div>
</div>

<div id="title" class="matrix-title"></div>

<div class="matrix-wrapper">
<svg id="svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#8e24aa"/>
    </marker>
  </defs>
</svg>
<div id="matrix" class="matrix"></div>
</div>

<div class="legend">
● ดำ = Pre‑Management &nbsp;
▲ ฟ้า = Post‑Management &nbsp;
★ ม่วง = L‑Qx × I‑Qx
</div>

<div id="axisInfo" class="axis-box"></div>

</div>
</div>

<script>
/* ================= Axis Meaning ================= */
const axisMeaning = {
  RF1:{ likelihood:"ความสำเร็จการดำเนินงานตามแผนงานบริหารความเสี่ยง",
        impact:"ไม่สามารถสร้างมูลค่าเพิ่มในธุรกิจหลักได้ตามเป้าหมาย"},
  RF2:{ likelihood:"ความสำเร็จการดำเนินงานตามแผนงานบริหารความเสี่ยง",
        impact:"ไม่สามารถสร้างรายได้จากธุรกิจ B2B / B2C ได้ตามเป้าหมาย"},
  RF3:{ likelihood:"ความสำเร็จการดำเนินงานตามแผนงานบริหารความเสี่ยง",
        impact:"ไม่สามารถสร้าง Grid Capacity และลดก๊าซเรือนกระจกได้"},
  RF4:{ likelihood:"ความสำเร็จการดำเนินงานตามแผนงานบริหารความเสี่ยง",
        impact:"ไม่สามารถดำเนินงานด้านพลังงานในนิคมอุตสาหกรรมได้"},
  RF5:{ likelihood:"ความสำเร็จการดำเนินงานตามแผนงานบริหารความเสี่ยง",
        impact:"ไม่สามารถพัฒนาทักษะดิจิทัล / AI ได้ตามเกณฑ์"},
  RF6:{ likelihood:"ความสำเร็จการดำเนินงานตามแผนงานบริหารความเสี่ยง",
        impact:"ไม่สามารถบริหารค่า SAIFI / SAIDI ได้ตามเป้าหมาย"},

  "ย":{ likelihood:"ความสำเร็จของแผนตอบสนองปัจจัยเสี่ยง (Risk Response)",
       impact:"ขยายผลใช้งานระบบที่นำ AI มาประยุกต์ใช้ได้ทั่วประเทศ"},
  "ธต":{ likelihood:"ดำเนินการตามแผนพัฒนาโมเดลธุรกิจ",
          impact:"ผลการพัฒนาโมเดลธุรกิจเป็นไปตามแผน"},
  "วว1":{ likelihood:"ความสำเร็จของแผนตอบสนองปัจจัยเสี่ยง",
           impact:"มีผลกระทบต่อองค์กร"},
  "วว2":{ likelihood:"ความสำเร็จของแผนตอบสนองปัจจัยเสี่ยง",
           impact:"มีผลกระทบต่อองค์กร"},
  "ป":{ likelihood:"ดำเนินการตามแผนควบคุมได้ครบถ้วน",
        impact:"ค่าเกณฑ์วัด BSC"},
  "ดส1":{ likelihood:"ปัญหากระบวนการจัดซื้อจัดจ้าง",
           impact:"เบิกจ่ายงบลงทุนได้ตามเป้า"},
  "ดส2":{ likelihood:"ความสำเร็จแผนกิจกรรมควบคุม",
           impact:"ผ่านการตรวจสอบช่องโหว่"},
  "บ":{ likelihood:"การเบิกจ่ายงบลงทุน",
        impact:"การเบิกจ่ายจริงในช่วงปี"},
  "บก1":{ likelihood:"ดำเนินงานตามแผนครบถ้วน",
          impact:"ค่าดัชนีการประสบอุบัติเหตุ (DI)"},
  "บก2":{ likelihood:"ทบทวนโครงการ PEA Academy",
          impact:"โครงสร้างหน่วยงานสอดคล้องแผน HR"},
  "ล":{ likelihood:"พัสดุคงคลังไม่มีการเคลื่อนไหว",
        impact:"ต้นทุนโลจิสติกส์สูง"},
  "น":{ likelihood:"ดำเนินงานตามแผนบริหารความเสี่ยง",
        impact:"ค่าเป้าหมายแผน ผวก."},
  "ฉ":{ likelihood:"ความสำเร็จแผนตอบสนองความเสี่ยง",
        impact:"ร้อยละการปิดงานก่อสร้าง (AUC)"},
  "ก":{ likelihood:"เพิ่มประสิทธิภาพการเบิกจ่ายงบลงทุน",
        impact:"บริหารแผนลงทุนได้ตามเป้า"},
  "ต":{ likelihood:"บริหารสินทรัพย์และงบลงทุน",
        impact:"แผนลงทุนภาคใต้ตามเป้าหมาย"},
  "สตภ.":{ likelihood:"ควบคุมตามแผนครบถ้วน",
            impact:"สร้างมูลค่าเพิ่มด้านการให้คำปรึกษา"},
  "ฝลอ.":{ likelihood:"โอกาสไม่เข้าใจระเบียบเดินทาง ตปท.",
            impact:"ความสำเร็จแผนสื่อสารความรู้"}
};

/* ================= Core Logic ================= */
const sheetUrl =
"https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=523652456";

const matrix = document.getElementById("matrix");
const svg = document.getElementById("svg");
const rfSel = document.getElementById("rf");
const qSel = document.getElementById("q");
const title = document.getElementById("title");
const axisBox = document.getElementById("axisInfo");

const cardL = document.getElementById("cardL");
const cardI = document.getElementById("cardI");
const cardS = document.getElementById("cardS");

const clamp = v => Math.min(5, Math.max(1, v));
const riskLevel = s => s <= 4 ? "low" : s <= 14 ? "medium" : "high";

const hasQuarterData = q =>
  q && q.L !== "" && q.I !== "" && !isNaN(q.L) && !isNaN(q.I);

const pos = (L,I)=>({x:(clamp(L)-.5)*20,y:(5-clamp(I)+.5)*20});

let data=[];

Papa.parse(sheetUrl,{
  download:true, header:true, skipEmptyLines:true,
  complete(res){
    data=res.data.map(r=>({
      rf:r.RF_GroupName,
      pre:{L:+r.L_pre, I:+r.I_pre},
      post:{L:+r.L_post, I:+r.I_post},
      Q1:{L:r.L_Q1, I:r.I_Q1},
      Q2:{L:r.L_Q2, I:r.I_Q2},
      Q3:{L:r.L_Q3, I:r.I_Q3},
      Q4:{L:r.L_Q4, I:r.I_Q4}
    }));
    rfSel.innerHTML =
      `<option value="ALL">ALL</option>` +
      [...new Set(data.map(d=>d.rf))]
        .map(x=>`<option value="${x}">${x}</option>`).join("");
    render();
  }
});

function drawMatrix(){
  matrix.innerHTML="";
  svg.innerHTML = svg.innerHTML.split("</defs>")[0]+"</defs>";
  for(let y=5;y>=1;y--)for(let x=1;x<=5;x++){
    const c=document.createElement("div");
    c.className="cell "+riskLevel(x*y);
    c.textContent=x*y;
    matrix.appendChild(c);
  }
}

function render(){
  drawMatrix();
  const rf=rfSel.value,q=qSel.value;
  title.textContent=`${q}/2569 | ${rf==="ALL"?"ALL RF":rf}`;

  if(rf==="ALL" || !axisMeaning[rf]){
    axisBox.innerHTML =
      "<b>Likelihood:</b> ความสำเร็จของการบริหารความเสี่ยง<br>" +
      "<b>Impact:</b> ผลกระทบต่อเป้าหมายองค์กร";
  } else {
    axisBox.innerHTML =
      `<b>Likelihood:</b> ${axisMeaning[rf].likelihood}<br>` +
      `<b>Impact:</b> ${axisMeaning[rf].impact}`;
  }

  data.filter(d=>rf==="ALL"||d.rf===rf).forEach((d,i)=>{
    plot(d.pre.L,d.pre.I,'<div class="circle"></div>',i*4);
    plot(d.post.L,d.post.I,'<div class="triangle"></div>',i*4+6);
    if(hasQuarterData(d[q])){
      drawArrow(pos(d.pre.L,d.pre.I),pos(d[q].L,d[q].I));
      plot(d[q].L,d[q].I,'<div class="star">★</div>',i*4+14);
    }
  });
}

function drawArrow(a,b){
  const l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",a.x+"%");
  l.setAttribute("y1",a.y+"%");
  l.setAttribute("x2",b.x+"%");
  l.setAttribute("y2",b.y+"%");
  l.setAttribute("stroke","#8e24aa");
  l.setAttribute("stroke-width","3");
  l.setAttribute("marker-end","url(#arrow)");
  svg.appendChild(l);
}

function plot(L,I,h,o){
  const p=document.createElement("div");
