<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v1.0.5 (Plan)</title>

<link rel="stylesheet" href="styles.css">

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
/* ===== buttons ===== */
.btn-filter {
  background:#60a5fa;          /* น้ำเงินอ่อน */
  color:white;
  border:none;
  padding:6px 14px;
  border-radius:6px;
  cursor:pointer;
  font-weight:500;
}
.btn-filter.active {
  background:#2563eb;          /* น้ำเงินเข้ม */
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ==================== Plan Data ==================== */
function usePlanData() {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const sheetId = "1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw";
    const url =
      `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=Plan`;

    fetch(url)
      .then(r => r.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header:true, skipEmptyLines:true });
        setRows(parsed.data);
        setLoading(false);
      });
  }, []);

  return { rows, loading };
}

/* ==================== Status Data ==================== */
function useStatusData() {
  const [rows, setRows] = React.useState([]);

  React.useEffect(() => {
    const sheetId = "1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw";
    const url =
      `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=Status_Combined`;

    fetch(url)
      .then(r => r.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header:true, skipEmptyLines:true });
        setRows(parsed.data);
      });
  }, []);

  return rows;
}

/* ==================== App ==================== */
function App() {
  const { rows, loading } = usePlanData();
  const statusRows = useStatusData();

  const [rfFilter, setRfFilter] = React.useState("ALL");
  const [riskType, setRiskType] = React.useState("ALL");   // ✅ NEW
  const [selectedPlan, setSelectedPlan] = React.useState(null);
  const [quarter, setQuarter] = React.useState("Q1");

  /* ---------- RF list ---------- */
  const rfList = React.useMemo(() => {
    return ["ALL", ...new Set(rows.map(r => r.RF_GroupName))];
  }, [rows]);

  const orgRF = ["RF1","RF2","RF3","RF4","RF5","RF6"];

  /* ---------- Group by Plan (FILTERED) ---------- */
  const planGroups = React.useMemo(() => {
    const map = {};

    rows.forEach(r => {

      /* RF dropdown */
      if (rfFilter !== "ALL" && r.RF_GroupName !== rfFilter) return;

      /* ✅ ความเสี่ยงองค์กร / สายงาน */
      if (riskType === "ORG" && !orgRF.includes(r.RF_GroupName)) return;
      if (riskType === "LINE" && orgRF.includes(r.RF_GroupName)) return;

      if (!map[r.PlanName]) map[r.PlanName] = [];
      map[r.PlanName].push(r);
    });

    return map;
  }, [rows, rfFilter, riskType]);

  const detailKey = `${quarter}_Detail`;
  const problemKey = `${quarter}_Problem`;
  const solutionKey = `${quarter}_Solution`;

  return (
    <div className="layout">
      <div className="content">

        <h2>Plan Report</h2>

        {!loading && !selectedPlan && (
          <>
            <div className="toolbar">

              <label>RF Group: </label>
              <select value={rfFilter}
                      onChange={e => setRfFilter(e.target.value)}>
                {rfList.map(rf => (
                  <option key={rf} value={rf}>{rf}</option>
                ))}
              </select>

              {/* ✅ NEW BUTTONS */}
              <button
                className={`btn-filter ${riskType==="ORG"?"active":""}`}
                onClick={() => setRiskType("ORG")}
              >
                ความเสี่ยงองค์กร
              </button>

              <button
                className={`btn-filter ${riskType==="LINE"?"active":""}`}
                onClick={() => setRiskType("LINE")}
              >
                ความเสี่ยงสายงาน
              </button>

            </div>

            <table>
              <thead>
                <tr>
                  <th>แผนงาน</th>
                  <th>RF</th>
                  <th>ผลการดำเนินงาน (%)</th>
                  <th>เป้าหมาย</th>
                  <th>สถานะ</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(planGroups).map(([planName, items]) => {
                  const p = items[0];
                  return (
                    <tr key={planName}
                        style={{cursor:"pointer"}}
                        onClick={() => setSelectedPlan({name:planName,items})}>
                      <td>{planName}</td>
                      <td align="center">{p.RF_GroupName}</td>
                      <td align="center">{p.ResultPercent}</td>
                      <td align="center">{p.TargetLevel5}</td>
                      <td>{p.Status_Combined}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
