<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v1.0.4 (Plan)</title>

<link rel="stylesheet" href="styles.css">

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { margin:0; font-family:Arial,sans-serif; background:#f3f4f6; }
.layout { display:flex; min-height:100vh; }
.content { flex:1; padding:24px; background:white; }

.toolbar { margin-bottom:12px; }

.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:16px;
}
.card {
  padding:16px;
  border-radius:8px;
  color:white;
}
.card h3 { margin:0; font-size:22px; }
.card p { margin-top:4px; font-size:14px; }

.bg-blue   { background:#2563eb; }
.bg-yellow { background:#ca8a04; }
.bg-purple { background:#7c3aed; }
.bg-green  { background:#16a34a; }

table { width:100%; border-collapse:collapse; margin-top:12px; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#e5e7eb; text-align:center; }

select, button { padding:6px 10px; margin-right:8px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ==================== Plan Data ==================== */
function usePlanData() {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const sheetId = "1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw";
    const url =
      `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=Plan`;

    fetch(url)
      .then(r => r.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header:true, skipEmptyLines:true });
        setRows(parsed.data);
        setLoading(false);
      });
  }, []);

  return { rows, loading };
}

/* ==================== Status_Combined Data ==================== */
function useStatusData() {
  const [rows, setRows] = React.useState([]);

  React.useEffect(() => {
    const sheetId = "1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw";
    const url =
      `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=Status_Combined`;

    fetch(url)
      .then(r => r.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header:true, skipEmptyLines:true });
        setRows(parsed.data);
      });
  }, []);

  return rows;
}

/* ==================== App ==================== */
function App() {
  const { rows, loading } = usePlanData();
  const statusRows = useStatusData();

  const [rfFilter, setRfFilter] = React.useState("ALL");
  const [selectedPlan, setSelectedPlan] = React.useState(null);
  const [quarter, setQuarter] = React.useState("Q1");

  /* ===== Status Summary ===== */
  const statusSummary = React.useMemo(() => {
    const planMap = new Map();

    statusRows.forEach(r => {
      if (r.PlanName && !planMap.has(r.PlanName)) {
        planMap.set(r.PlanName, r);
      }
    });

    const uniquePlans = Array.from(planMap.values());

    return {
      total: uniquePlans.length,
      lv1: uniquePlans.filter(p =>
        p.Status_Combined === "รอยืนยันข้อมูล | ระดับที่ 1"
      ).length,
      lv3: uniquePlans.filter(p =>
        p.Status_Combined === "รอยืนยันข้อมูล | ระดับที่ 3"
      ).length,
      done: uniquePlans.filter(p =>
        p.Status_Combined === "ยืนยันข้อมูลแล้ว"
      ).length
    };
  }, [statusRows]);

  /* ---------- ✅ RF List (เรียงใหม่ตามบรีฟ) ---------- */
  const rfList = React.useMemo(() => {
    const list = Array.from(
      new Set(rows.map(r => r.RF_GroupName).filter(Boolean))
    );

    list.sort((a, b) => {
      const aThai = /[ก-ฮ]/.test(a);
      const bThai = /[ก-ฮ]/.test(b);

      // อังกฤษ/ตัวเลข มาก่อน ไทย
      if (aThai && !bThai) return 1;
      if (!aThai && bThai) return -1;

      // RF + ตัวเลข → เรียงตามตัวเลข
      return a.localeCompare(b, "en", { numeric: true });
    });

    return ["ALL", ...list];
  }, [rows]);

  /* ---------- Group by Plan ---------- */
  const planGroups = React.useMemo(() => {
    const map = {};
    rows.forEach(r => {
      if (rfFilter !== "ALL" && r.RF_GroupName !== rfFilter) return;
      if (!map[r.PlanName]) map[r.PlanName] = [];
      map[r.PlanName].push(r);
    });
    return map;
  }, [rows, rfFilter]);

  const detailKey = `${quarter}_Detail`;
  const problemKey = `${quarter}_Problem`;
  const solutionKey = `${quarter}_Solution`;

  return (
    <div className="layout">
      <div className="content">

        <h2>Plan Report</h2>

        <div className="cards">
          <div className="card bg-blue">
            <h3>{statusSummary.total}</h3>
            <p>จำนวนแผนทั้งหมด</p>
          </div>
          <div className="card bg-yellow">
            <h3>{statusSummary.lv1}</h3>
            <p>รอยืนยันข้อมูล | ระดับที่ 1</p>
          </div>
          <div className="card bg-purple">
            <h3>{statusSummary.lv3}</h3>
            <p>รอยืนยันข้อมูล | ระดับที่ 3</p>
          </div>
          <div className="card bg-green">
            <h3>{statusSummary.done}</h3>
            <p>ยืนยันข้อมูลแล้ว</p>
          </div>
        </div>

        {!loading && !selectedPlan && (
          <>
            <div className="toolbar">
              <label>RF Group: </label>
              <select
                value={rfFilter}
                onChange={e => setRfFilter(e.target.value)}
              >
                {rfList.map(rf => (
                  <option key={rf} value={rf}>{rf}</option>
                ))}
              </select>
            </div>

            {/* ตารางคงเดิม */}
          </>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
