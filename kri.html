<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Enterprise Risk Dashboard – v2.06.1 (KRI)</title>

<link rel="stylesheet" href="styles.css">
<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; }
.layout { display:flex; min-height:100vh; }
.sidebar { width:240px; background:#0f172a; color:white; padding:16px; }
.sidebar button { width:100%; padding:10px; margin-bottom:8px; background:none; border:none; color:white; text-align:left; }
.sidebar button.active { background:#334155; }
.content { flex:1; padding:24px; background:white; }

.toolbar { margin-bottom:14px; display:flex; gap:12px; align-items:center; }
select { padding:6px 10px; }

.summary { display:flex; gap:12px; margin-bottom:16px; }
.card { border-radius:8px; padding:12px 16px; min-width:180px; border:1px solid #e5e7eb; }
.counts { display:flex; gap:10px; font-size:13px; }
.green { color:#16a34a; } .yellow { color:#ca8a04; } .red { color:#dc2626; }

table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#e5e7eb; }

.gauge { width:140px; height:80px; }
.badge { padding:4px 8px; background:#e5e7eb; border-radius:6px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const toNum = v => Number(String(v).replace(/,/g,""));
const isNum = v => !isNaN(toNum(v));

function getRiskLevel(row){
  const k=toNum(row.KRI_Status), ra=toNum(row.RA), rt=toNum(row.RT);
  if(!isNum(k)||!isNum(ra)||!isNum(rt)) return null;

  if(row.Direction==="LOW_GOOD"){
    if(k<=ra) return "green";
    if(k<rt) return "yellow";
    return "red";
  } else {
    if(k<rt) return "red";
    if(k<ra) return "yellow";
    return "green";
  }
}

function RiskMeter({kri,ra,rt,direction}){
  if(!isNum(kri)||!isNum(ra)||!isNum(rt)) return <span className="badge">KRI เชิงคุณภาพ</span>;
  const max=Math.max(kri,ra,rt)*1.1;
  const ang=v=>Math.min(v/max*180,180);
  const pol=a=>{
    const r=(a-180)*Math.PI/180;
    return {x:100+80*Math.cos(r),y:90+80*Math.sin(r)};
  };

  let zones;
  if(direction==="LOW_GOOD"){
    zones=[
      {from:0,to:ra,color:"#16a34a"},
      {from:ra,to:rt,color:"#facc15"},
      {from:rt,to:max,color:"#dc2626"},
    ];
  } else {
    zones=[
      {from:0,to:rt,color:"#dc2626"},
      {from:rt,to:ra,color:"#facc15"},
      {from:ra,to:max,color:"#16a34a"},
    ];
  }

  return (
    <svg viewBox="0 0 200 120" className="gauge">
      {zones.map((z,i)=>{
        const p1=pol(ang(z.from)), p2=pol(ang(z.to));
        return <path key={i}
          d={`M${p1.x} ${p1.y} A80 80 0 0 1 ${p2.x} ${p2.y}`}
          stroke={z.color} strokeWidth="16" fill="none"/>;
      })}
      <line x1="100" y1="90"
            x2={pol(ang(kri)).x}
            y2={pol(ang(kri)).y}
            stroke="#111827" strokeWidth="3"/>
      <circle cx="100" cy="90" r="4" fill="#111827"/>
      <text x="100" y="115" textAnchor="middle" fontSize="12">{kri}</text>
    </svg>
  );
}

function App(){
  const [rows,setRows]=React.useState([]);
  const [rf,setRf]=React.useState("ALL");
  const [m,setM]=React.useState("ALL");

  React.useEffect(()=>{
    fetch("https://docs.google.com/spreadsheets/d/1J5MfU5JTDEazsGPEesa7u2oR-wRPI4wr8e5APKglEyw/export?format=csv&gid=2142357339")
      .then(r=>r.text()).then(csv=>{
        setRows(Papa.parse(csv,{header:true}).data);
      });
  },[]);

  const filtered=rows.filter(r=>
    (rf==="ALL"||r.RF_GroupName===rf)&&(m==="ALL"||r.Month===m)
  );

  return (
    <div className="layout">
      <div className="sidebar"><h3>Enterprise Risk</h3><button className="active">KRI</button></div>
      <div className="content">
        <div className="toolbar">
          RF:
          <select value={rf} onChange={e=>setRf(e.target.value)}>
            {["ALL",...new Set(rows.map(r=>r.RF_GroupName))].map(x=><option key={x}>{x}</option>)}
          </select>
          Month:
          <select value={m} onChange={e=>setM(e.target.value)}>
            {["ALL",...new Set(rows.map(r=>r.Month))].map(x=><option key={x}>{x}</option>)}
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th>RF</th><th>Month</th><th>KRI</th><th>Units</th>
              <th>Status</th><th>RA</th><th>RT</th><th>Meter</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((r,i)=>
              <tr key={i}>
                <td>{r.RF_GroupName}</td>
                <td>{r.Month}</td>
                <td>{r.KRI_Name}</td>
                <td>{r.Units}</td>
                <td>{r.KRI_Status}</td>
                <td>{r.RA}</td>
                <td>{r.RT}</td>
                <td>
                  <RiskMeter
                    kri={toNum(r.KRI_Status)}
                    ra={toNum(r.RA)}
                    rt={toNum(r.RT)}
                    direction={r.Direction}/>
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
